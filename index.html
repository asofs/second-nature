<!--
  HOW TO ADD A NEW POST:

  1. Add your card image to images/ (600x800px, 3:4 ratio, PNG or JPG)
  2. Duplicate posts/template.html, rename it posts/your-post-name.html
  3. Fill in the title, subtitle, article text, and update the 3 tape image srcs
  4. In index.html: copy one existing <a class="card"> block, update the image src, title, and href
  5. Commit: git add . && git commit -m "add post: your-topic"
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Nature</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #f5f3e4;
    --text: #2a2a2a;
    --text-light: #666;
    --tape: rgba(230, 218, 170, 0.85);
    --tape-border: rgba(200, 185, 130, 0.6);
    --card-bg: #faf9f4;
    --card-shadow: rgba(0,0,0,0.08);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 32px 60px 0;
    position: relative;
  }

  nav a {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    text-decoration: none;
    letter-spacing: 0.03em;
  }

  nav a:hover {
    color: var(--text-light);
  }

  .site-title {
    font-family: 'IM Fell English', serif;
    font-size: 34px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
    text-decoration: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  /* ── GALLERY ── */
  main {
    padding: 52px 52px 80px;
    max-width: 860px;
    margin: 0 auto;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    row-gap: 52px;
    column-gap: 32px;
  }

  /* ── CARD ── */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .card-paper {
    position: relative;
    width: 100%;
    background: var(--card-bg);
    box-shadow: 2px 3px 14px var(--card-shadow);
    padding: 10px 10px 14px;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }

  .card:hover .card-paper {
    transform: translateY(-3px) rotate(0.3deg);
    box-shadow: 4px 8px 22px rgba(0,0,0,0.12);
  }

  /* tape strip */
  .card-paper::before {
    content: '';
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%) rotate(-1deg);
    width: 52px;
    height: 20px;
    background: var(--tape);
    border: 0.5px solid var(--tape-border);
    border-radius: 1px;
    z-index: 2;
  }

  /* slight torn-paper lower edge on some cards for variety */
  .card:nth-child(3n+1) .card-paper::before { transform: translateX(-50%) rotate(-2deg); left: 45%; }
  .card:nth-child(3n+2) .card-paper::before { transform: translateX(-50%) rotate(1.5deg); }
  .card:nth-child(3n+3) .card-paper::before { transform: translateX(-50%) rotate(-0.5deg); left: 55%; }

  .card-img {
    width: 100%;
    aspect-ratio: 3 / 4;
    object-fit: cover;
    display: block;
  }

  /* placeholder when no image supplied */
  .card-placeholder {
    width: 100%;
    aspect-ratio: 3 / 4;
    background: #ede9da;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-placeholder svg {
    opacity: 0.35;
    width: 60%;
    height: 60%;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    font-style: italic;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.02em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    nav { padding: 24px 24px 0; }
    main { padding-left: 20px; padding-right: 20px; }
    .gallery { grid-template-columns: repeat(2, 1fr); column-gap: 20px; row-gap: 40px; }
    .site-title { font-size: 24px; }
  }
</style>
</head>

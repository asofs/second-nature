<!--
  HOW TO ADD A NEW POST:

  1. Add your card image to images/ (600x800px, 3:4 ratio, PNG or JPG)
  2. Duplicate posts/template.html, rename it posts/your-post-name.html
  3. Fill in the title, subtitle, article text, and update the 3 tape image srcs
  4. In index.html: copy one existing <a class="card"> block, update the image src, title, and href
  5. Commit: git add . && git commit -m "add post: your-topic"
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Nature</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Radley:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #fffef0;
    --text: #2a2a2a;
    --text-light: #666;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Radley', serif;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 32px 60px 0;
    position: relative;
  }

  nav a {
    font-family: 'Radley', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    text-decoration: none;
    letter-spacing: 0.03em;
  }

  nav a:hover {
    color: var(--text-light);
  }

  .site-title {
    font-family: 'Radley', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.01em;
    text-decoration: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  /* ── GALLERY ── */
  main {
    padding: 52px 52px 80px;
    max-width: 860px;
    margin: 0 auto;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px 40px;
    padding: 40px 60px;
    align-items: start;
  }

  /* ── CARD ── */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
  }

  .card-wrapper {
    position: relative;
    width: 100%;
  }

  .tape {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%) rotate(12deg);
    width: 75px;
    z-index: 10;
    pointer-events: none;
  }

  .card-paper {
    width: 100%;
    aspect-ratio: 3 / 4;
    overflow: hidden;
    position: relative;
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-title {
    font-family: 'Radley', serif;
    font-size: 16px;
    font-weight: 400;
    font-style: normal;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.02em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    nav { padding: 24px 24px 0; }
    main { padding-left: 20px; padding-right: 20px; }
    .gallery { grid-template-columns: repeat(2, 1fr); gap: 40px 20px; }
    .site-title { font-size: 24px; }
  }
</style>
</head>
